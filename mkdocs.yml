site_name: Zomi‑Syl Documentation
site_description: "A modular, dialect‑aware Zomi syllabification library with multiple backends."
site_author: "Zomi‑Syl Contributors"
site_url: "https://ZomiLearner.github.io/zomi-syl/"

repo_url: "https://github.com/ZomiLearner/zomi-syl"
repo_name: "zomi-syl"

extra:
  version:
    provider: mike

theme:
  name: mkdocs
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed
  - pymdownx.tasklist

nav:
  - Home: index.md

  - User Guide:
      - Installation: user/installation.md
      - Quick Start: user/quick_start.md
      - CLI Reference: user/cli_reference.md
      - Dialect Profiles: user/dialect_profiles.md
      - Benchmarking: user/benchmarking.md

  - Developer Guide:
      - Adding New Models: developer/Adding_New_Models_(Backends).md
      - Developer Guide for Adding Backends: developer/Developer_Guide_for_Adding_New_Backends.md
      - New Backend Template: developer/New_Backend_Template.md
      - Backend Loader: developer/Public_Backend_Loader.md
      - Recommended Folder Structure: developer/Recommended_Folder_Structure.md
      - Unified Metadata Schema (UMS): developer/Unified_Metadata_Schema_(UMS)_v1.0.md
      - UMS Implementation: developer/UMS_Implementation.md
      - CRF Training:
          - Tagset & Feature Template: developer/Adding_Tagset_and_Feature_Template_to_crf.md
      - Test Templates:
          - Backend Test Template: developer/Template_Test_Backend.md
          - Test Rule Backend: developer/Test_Rule_Backend.md
          - Test CRF Backend: developer/Test_CRF_Backend.md
          - Test CLI Commands: developer/Test_CLI_Commands.md
          - Integration Tests: developer/Test_Syllabify_Integration.md
      - Changelog Template: developer/CHANGELOG_template.md

  - Reference:
      - Top‑Level Commands: reference/Top_Level_Commands_v0.1.0.md
      - BI‑based Syllabification: reference/BI-based_Zomi_Syllabification.md
      - Backends Tagset Info: reference/Backends_Tagset_Info.md

  - Guides:
      - Linguistic Contributors Guide: guides/Linguistic_Contributors_Guide.md
      - Infra Maintainers Guide: guides/Infra_Maintainers_Guide.md
      - Release Checklist: guides/RELEASE_CHECKLIST.md

  - Changelog:
      - v0.1.0 Release Notes: changelog/RELEASE_CHECKLIST_v0.1.0.md

  - About:
      - About Zomi-Syl: about/About_Zomi-Syl.md