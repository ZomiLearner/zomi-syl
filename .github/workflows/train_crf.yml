name: Train & Upload CRF Syllabifier

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "training/**"
      - "src/zomi_syl/**"
      - ".github/workflows/train_crf.yml"

env:
  PYTHON_VERSION: "3.10"
  HF_DATASET: ${{ secrets.HF_DATASET_ZOMI_SYLLABIFIED_HUMAN }}
  HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO_CRF }}

permissions:
  contents: read

concurrency:
  group: crf-syllabifier-${{ github.ref }}
  cancel-in-progress: true

jobs:

  train-eval:
    name: Fetch → Clean → Train → Evaluate → Freeze → Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install sklearn-crfsuite joblib huggingface_hub datasets

      - name: Download dataset from HuggingFace
        run: |
          mkdir -p training/data
          python - << 'EOF'
from datasets import load_dataset
ds = load_dataset("${{ env.HF_DATASET }}", split="train")
with open("training/data/zomi_syllabified_human.tsv", "w") as f:
    f.write("word\tsyllables\n")
    for row in ds:
        f.write(f"{row['word']}\t{row['syllables']}\n")
EOF

      - name: Clean dataset
        run: python -m training.scripts.clean_dataset

      - name: Train CRF syllabifier
        run: |
          python -m training.scripts.train_crf \
            --input training/data/training/zomi_only.tsv \
            --output training/model/

      - name: Run tests
        run: pytest -q

      - name: Evaluate model
        id: eval
        run: |
          python -m training.scripts.evaluate_crf > eval.txt
          ACC=$(grep "Accuracy" eval.txt | awk '{print $2}')
          PREC=$(grep "Precision" eval.txt | awk '{print $2}')
          REC=$(grep "Recall" eval.txt | awk '{print $2}')
          F1=$(grep "F1" eval.txt | awk '{print $2}')
          echo "acc=$ACC" >> $GITHUB_OUTPUT
          echo "prec=$PREC" >> $GITHUB_OUTPUT
          echo "rec=$REC" >> $GITHUB_OUTPUT
          echo "f1=$F1" >> $GITHUB_OUTPUT

      - name: Freeze model
        run: python -m training.scripts.freeze_model

      - name: Generate model card
        run: |
          sed -e "s/{{MODEL_NAME}}/Zomi CRF Syllabifier/" \
              -e "s/{{MODEL_TYPE}}/CRF/" \
              -e "s/{{TASK_NAME}}/Syllabification/" \
              -e "s/{{VERSION}}/${{ github.sha }}/" \
              -e "s/{{TIMESTAMP}}/$(date -u)/" \
              -e "s/{{FRAMEWORK}}/sklearn-crfsuite/" \
              -e "s/{{LICENSE}}/MIT/" \
              -e "s/{{METRIC_ACCURACY}}/${{ steps.eval.outputs.acc }}/" \
              -e "s/{{METRIC_PRECISION}}/${{ steps.eval.outputs.prec }}/" \
              -e "s/{{METRIC_RECALL}}/${{ steps.eval.outputs.rec }}/" \
              -e "s/{{METRIC_F1}}/${{ steps.eval.outputs.f1 }}/" \
              training/templates/model_card_template.md > README.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crf-syllabifier-artifacts
          path: |
            training/model/
            eval.txt
            README.md

  publish-hf:
    name: Publish to Hugging Face
    needs: train-eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face CLI
        run: pip install huggingface_hub

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: crf-syllabifier-artifacts
          path: artifacts

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_MODEL_REPO_CRF }}
        run: |
          hf upload "$HF_REPO" artifacts/training/model/crf_syllabifier.joblib crf_syllabifier.joblib --repo-type model --token "$HF_TOKEN"
          hf upload "$HF_REPO" artifacts/training/model/config.json config.json --repo-type model --token "$HF_TOKEN"
          hf upload "$HF_REPO" artifacts/README.md README.md --repo-type model --token "$HF_TOKEN"
          hf upload "$HF_REPO" artifacts/eval.txt eval.txt --repo-type model --token "$HF_TOKEN"
